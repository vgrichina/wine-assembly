<!DOCTYPE html>
<html>
<head>

  <title>Wine-Assembly — Windows 98 Emulator</title>
  <style>
    @font-face {
      font-family: "W95FA";
      src: url("fonts/w95fa.woff2") format("woff2"),
           url("fonts/W95FA.otf") format("opentype");
      font-display: block;
    }
    @font-face {
      font-family: "Fixedsys Excelsior";
      src: url("fonts/FSEX302.ttf") format("truetype");
      font-display: block;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #008080;
      font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, sans-serif;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      margin: 8px;
    }
    #titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar {
      padding: 4px 6px;
      border-bottom: 1px solid #808080;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    #toolbar select, #toolbar button {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 8px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      cursor: pointer;
    }
    #toolbar button:active { border-style: inset; }
    #toolbar .debug-midi {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #content {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }
    #screen-wrap {
      flex: 1;
      display: flex;
      background: #008080;
      overflow: hidden;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      cursor: default;
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    #log {
      width: 320px;
      min-height: 0;
      background: #000;
      color: #0f0;
      font-family: "Fixedsys", "Courier New", monospace;
      font-size: 11px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px inset #808080;
    }
    #taskbar {
      background: #c0c0c0;
      border-top: 2px outset #dfdfdf;
      padding: 2px 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: "Microsoft Sans Serif", "MS Sans Serif", Tahoma, Arial, sans-serif;
    }
    #taskbar .start-btn {
      font-weight: bold;
      padding: 2px 6px 2px 2px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      height: 22px;
    }
    #taskbar .start-btn:active,

    #start-menu {
      position: absolute;
      bottom: 28px;
      left: 4px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: "Microsoft Sans Serif", "MS Sans Serif", Tahoma, Arial, sans-serif;

      z-index: 100;

      padding: 2px;
      flex-direction: row;
      align-items: stretch;

    #start-menu.open { display: flex; }
    #start-menu .banner {
      background: linear-gradient(to bottom, #1084d0, #000080);

      writing-mode: vertical-rl;

    .win-flag { display: inline-grid; grid-template-columns: 5px 5px; gap: 1px; }

    #task-buttons { display: flex; gap: 2px; flex: 1; min-width: 0; overflow: hidden; }

      align-items: center;

    #compile-status {

      font-family: "MS Sans Serif", Tahoma, sans-serif; font-size: 13px;
      z-index: 9999; display: none;
    }
    #desktop-icons {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 80px);
      grid-auto-rows: 84px;
      gap: 4px 8px;
      align-content: start;
      pointer-events: none;
      z-index: 1;

    .desktop-icon {

      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
      padding: 2px;

      padding: 1px 3px;
      max-width: 76px;
      word-wrap: break-word;

    body.no-debug #titlebar,
    body.no-debug #toolbar,
    body.no-debug #log { display: none; }
    body.no-debug #screen-wrap { background: #008080; }
    body.no-debug canvas { background: transparent; z-index: 2; }
    body.exclusive-fullscreen,
    body.exclusive-fullscreen #shell,
    body.exclusive-fullscreen #content,
    body.exclusive-fullscreen #screen-wrap {

      height: 100vh;
      margin: 0;
      padding: 0;
      border: 0;
      background: #000;
    }
    body.exclusive-fullscreen {

    }
    body.exclusive-fullscreen #screen-wrap {
      position: fixed;
      inset: 0;
      max-width: none;
      max-height: none;
    }
    body.exclusive-fullscreen #titlebar,
    body.exclusive-fullscreen #toolbar,
    body.exclusive-fullscreen #log,
    body.exclusive-fullscreen #taskbar,
    body.exclusive-fullscreen #desktop-icons { display: none !important; }
    body.exclusive-fullscreen canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      max-width: none !important;
      max-height: none !important;
    }
    #screen-wrap:fullscreen {
      position: fixed;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      margin: 0;
      padding: 0;
      background: #000;
    }
    #screen-wrap:-webkit-full-screen {
      position: fixed;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      margin: 0;
      padding: 0;
      background: #000;
    }
    #screen-wrap::backdrop,
    #screen-wrap::-webkit-backdrop {
      background: #000;
    }
    #screen-wrap:fullscreen canvas,
    #screen-wrap:-webkit-full-screen canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }
  </style>

  <script>
    function toggleStartMenu(e) {
      if (e) e.stopPropagation();
      const m = document.getElementById('start-menu');
      const b = document.getElementById('start-btn');
      const open = m.classList.toggle('open');
      b.classList.toggle('open', open);
    }
    document.addEventListener('click', (e) => {
      const m = document.getElementById('start-menu');
      if (!m.classList.contains('open')) return;
      if (e.target.closest('#start-menu') || e.target.closest('#start-btn')) return;
      m.classList.remove('open');
      document.getElementById('start-btn').classList.remove('open');
    });
  </script>

  <script>
    let wine = null;
    const runningApps = [];  // array of { wine, name, appIndex }
    let nextAppIndex = 0;
    let sharedRenderer = null;
    let sharedWasmModule = null;
    let inputWired = false;

    const DEFAULT_APPS = [
      ['notepad',     'Notepad',     '\u{1F4DD}'],
      ['calc',        'Calculator',  '\u{1F9EE}'],
      ['freecell',    'FreeCell',    '\u{1F0CF}'],
      ['sol',         'Solitaire',   '\u{2660}'],
      ['cruel',       'Cruel',       '\u{1F0A1}'],
      ['golf',        'Golf',        '\u{26F3}'],
      ['pegged',      'Pegged',      '\u{1F3AF}'],
      ['snake',       'Rattler',     '\u{1F40D}'],
      ['taipei',      'Taipei',      '\u{1F004}'],
      ['tictac',      'TicTactics',  '\u{274C}'],
      ['reversi',     'Reversi',     '\u{26AB}'],
      ['winmine_wep', 'Minesweeper', '\u{1F4A3}'],
      ['ski32',       'SkiFree',     '\u{26F7}'],
      ['pinball',     'Pinball',     '\u{1F3D0}'],
    ];
    const DEFAULT_APP_SET = new Set(DEFAULT_APPS.map(a => a[0]));
    const DEBUG_MODE = new URLSearchParams(location.search).has('debug');
    function initDesktop() {
      // Pre-launch click forwarder: canvas sits over the icons even before
      // wireCanvasInput runs, so clicks would be swallowed. Forward any click
      // on the canvas through to the icon underneath until the real input
      // wiring takes over (wireCanvasInput overwrites these handlers).
      const cv = document.getElementById('screen');
      cv.onmousedown = e => {
        cv.style.pointerEvents = 'none';
        const under = document.elementFromPoint(e.clientX, e.clientY);
        cv.style.pointerEvents = '';
        const iconEl = under && under.closest && under.closest('.desktop-icon');
        if (iconEl) iconEl.dispatchEvent(new MouseEvent('click', { bubbles: true, clientX: e.clientX, clientY: e.clientY }));
      };
      const sel = document.getElementById('app-select');
      for (const opt of [...sel.querySelectorAll('option')]) {
        if (!DEFAULT_APP_SET.has(opt.value)) opt.remove();
      }
      for (const grp of [...sel.querySelectorAll('optgroup')]) {
        if (!grp.querySelector('option')) grp.remove();
      }
      const grid = document.getElementById('desktop-icons');
      for (const [value, label, glyph] of DEFAULT_APPS) {
        const el = document.createElement('div');
        el.className = 'desktop-icon';
        el.dataset.app = value;
        el.innerHTML = '<div class="icon-img">' + glyph + '</div><div class="icon-label">' + label + '</div>';
        const exePath = apps[value] && apps[value].exe;
        if (exePath && typeof fetchIconDataURL === 'function') {
          fetchIconDataURL(exePath).then(url => {
            if (!url) return;
            const imgDiv = el.querySelector('.icon-img');
            if (imgDiv) {
              imgDiv.innerHTML = '<img src="' + url + '" style="width:32px;height:32px;image-rendering:pixelated">';
              imgDiv.style.background = 'transparent';
              imgDiv.style.border = '0';
            }
          });
        }
        let lastClick = 0;
        el.addEventListener('click', () => {
          for (const e of grid.querySelectorAll('.desktop-icon.selected')) e.classList.remove('selected');
          el.classList.add('selected');
          const now = Date.now();
          if (now - lastClick < 500) {
            sel.value = value;
            launchApp();
            lastClick = 0;
          } else {
            lastClick = now;
          }
        });
        grid.appendChild(el);
      }
    }
    if (!DEBUG_MODE) {
      document.body.classList.add('no-debug');
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', initDesktop);
      } else {
        initDesktop();
      }
    }

    const apps = {
      notepad:  { exe: 'binaries/notepad.exe' },
      calc:     { exe: 'binaries/calc.exe', dlls: ['binaries/dlls/msvcrt.dll'] },

    let debugMidiPlayer = null;
    let debugMidiAudioHost = null;

    function appFileUrl(file) {
      if (!file) return '';
      return typeof file === 'string' ? file : (file.url || '');
    }

    function midiBaseName(url) {
      return String(url || '').split(/[\/\\]/).pop();
    }

    function midiContainerKind(bytes) {
      if (!bytes || bytes.length < 14) return '';
      const text4 = (p) => String.fromCharCode(bytes[p], bytes[p + 1], bytes[p + 2], bytes[p + 3]);
      if (text4(0) === 'MThd') return 'SMF';
      if (bytes.length >= 24 && text4(0) === 'RIFF' && text4(8) === 'RMID') return 'RMID';
      return '';
    }

    function initDebugMidiSelect() {
      if (!DEBUG_MODE) return;
      const sel = document.getElementById('midi-select');
      if (!sel) return;
      const seen = new Set();
      for (const [appKey, app] of Object.entries(apps)) {
        for (const file of (app.files || [])) {
          const url = appFileUrl(file);
          if (!/\.(mid|midi|rmi)$/i.test(url) || seen.has(url)) continue;
          seen.add(url);
          const opt = document.createElement('option');
          opt.value = url;
          opt.textContent = appKey + ': ' + midiBaseName(url);
          sel.appendChild(opt);
        }
      }
      if (!sel.options.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'No MIDI assets';
        sel.appendChild(opt);
      }
    }

    function writeDebugString(memory, ptr, value) {
      const mem = new Uint8Array(memory.buffer);
      const s = String(value || '');
      for (let i = 0; i < s.length && ptr + i + 1 < mem.length; i++) {
        mem[ptr + i] = s.charCodeAt(i) & 0xFF;
      }
      mem[Math.min(ptr + s.length, mem.length - 1)] = 0;
    }

    function stopDebugMidi(quiet) {
      if (debugMidiPlayer) {
        try { debugMidiPlayer.imports.host.mci_command(debugMidiPlayer.id, 0x0804, 0, 0); } catch (_) {}
        debugMidiPlayer = null;
      }
      if (!quiet) document.getElementById('status').textContent = 'MIDI stopped';
    }

    async function playDebugMidi() {
      const sel = document.getElementById('midi-select');
      const url = sel && sel.value;
      if (!url) return;
      stopDebugMidi(true);
      const status = document.getElementById('status');
      const name = midiBaseName(url);
      status.textContent = 'Loading MIDI...';
      try {
        if (!debugMidiAudioHost) debugMidiAudioHost = new WineAssembly();
        const ac = debugMidiAudioHost.primeAudio();
        const response = await fetch(url + '?v=51');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const bytes = new Uint8Array(await response.arrayBuffer());
        if (!midiContainerKind(bytes)) {
          status.textContent = name + ' is not SMF/RMID MIDI data';
          console.warn('[debug-midi] unsupported MIDI container:', name, bytes.slice(0, 16));
          return;
        }
        const memory = new WebAssembly.Memory({ initial: 1 });
        const path = 'c:\\' + name.toLowerCase();
        const files = new Map([[path, { data: bytes, attrs: 0x20 }]]);
        const ctx = {
          getMemory: () => memory.buffer,
          get _audioCtx() { return ac; },
          trimMidiLeadIn: true,
          readFile: (requested) => {
            const base = midiBaseName(requested).toLowerCase();
            const entry = files.get('c:\\' + base);
            return entry && entry.data;
          },
          vfs: { files },
        };
        const imports = createHostImports(ctx);
        writeDebugString(memory, 0x100, name);
        const id = imports.host.mci_open(0x100, 0, 0x2002);
        const dev = ctx._mci && ctx._mci.devices && ctx._mci.devices.get(id >>> 0);
        if (!dev || !dev.smf || !dev.smf.notes.length) {
          throw new Error('MIDI parsed with no notes');
        }
        const err = imports.host.mci_command(id, 0x0806, 0, 0);
        if (err) throw new Error('MCI_PLAY failed: 0x' + (err >>> 0).toString(16));
        debugMidiPlayer = { imports, id, ctx, url };
        status.textContent = 'Playing MIDI: ' + name + ' (' + dev.smf.notes.length + ' notes)';
      } catch (e) {
        console.error('[debug-midi] failed:', e);
        status.textContent = 'MIDI failed: ' + (e && e.message ? e.message : e);
      }
    }

    initDebugMidiSelect();

    function wireCanvasInput(canvas, renderer) {
      if (inputWired) return;
      inputWired = true;
      canvas.oncontextmenu = e => e.preventDefault();
      function eventPoint(e) {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        const x = Math.floor((e.clientX - r.left) * sx);
        const y = Math.floor((e.clientY - r.top) * sy);
        return renderer.mapCanvasPoint ? renderer.mapCanvasPoint(x, y) : { x, y };
      }
      function requestBrowserFullscreen() {
        const target = document.getElementById('screen-wrap') || canvas;
        if (!document.fullscreenElement && target && target.requestFullscreen) {
          renderer._requestedBrowserFullscreen = true;
          try {
            const p = target.requestFullscreen();
            if (p && p.then) p.then(resizeCanvas).catch(() => {});
          } catch (_) {}
        }
      }
      function windowAtCanvas(cx, cy) {
        for (const w of Object.values(renderer.windows)) {
          if (!w.visible || w.isChild) continue;
          if (cx >= w.x && cx < w.x + w.w && cy >= w.y && cy < w.y + w.h) return w;
        }
        return null;
      }
      canvas.onmousedown = e => {
        canvas.focus();
        if (renderer._exclusiveFullscreen) requestBrowserFullscreen();
        const { x: cx, y: cy } = eventPoint(e);
        if (!DEBUG_MODE && !windowAtCanvas(cx, cy)) {
          // No window here — forward click to the icon under the cursor.
          canvas.style.pointerEvents = 'none';
          const under = document.elementFromPoint(e.clientX, e.clientY);
          canvas.style.pointerEvents = '';
          const iconEl = under && under.closest && under.closest('.desktop-icon');
          if (iconEl) {
            iconEl.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, clientX: e.clientX, clientY: e.clientY }));
            return;
          }
          // Empty desktop click: clear icon selection.
          for (const sel of document.querySelectorAll('.desktop-icon.selected')) sel.classList.remove('selected');
        }
        renderer.handleMouseDown(cx, cy, e.button);
      };
      canvas.onmouseup = e => {
        const { x, y } = eventPoint(e);
        renderer.handleMouseUp(x, y, e.button);
      };
      canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const { x, y } = eventPoint(e);
        renderer.handleWheel(x, y, e.deltaY);
      }, { passive: false });
      canvas.setAttribute('tabindex', '0');
      canvas.focus();
      // Default-claim keys when canvas is focused: the guest gets every
      // keystroke except those reserved for the browser/OS (close tab,
      // reload, devtools, fullscreen, OS keys). This matches Win98 feel
      // — Ctrl+S/F/P etc. land in the app instead of the browser.
      const keepForBrowser = (e) => {
        const vk = e.keyCode;
        if (e.metaKey) return true;                          // Cmd/Win
        if (vk === 44) return true;                          // PrintScreen
        if (vk === 122 || vk === 123) return true;           // F11, F12
        if (vk === 116) return true;                         // F5 (reload)
        if (e.ctrlKey && vk === 82) return true;             // Ctrl+R
        if (e.ctrlKey && vk === 87) return true;             // Ctrl+W
        if (e.ctrlKey && vk === 84) return true;             // Ctrl+T
        if (e.ctrlKey && vk === 9)  return true;             // Ctrl+Tab
        if (e.ctrlKey && vk === 33) return true;             // Ctrl+PgUp
        if (e.ctrlKey && vk === 34) return true;             // Ctrl+PgDn
        if (e.ctrlKey && vk === 27) return true;             // Ctrl+Esc
        if (e.ctrlKey && e.shiftKey && (vk === 73 || vk === 74 || vk === 67)) return true; // devtools
        if (e.ctrlKey && (vk === 187 || vk === 189 || vk === 48)) return true; // zoom
        if (e.altKey && vk === 115) return true;             // Alt+F4
        return false;
      };
      // Keys that would generate a printable character via the keypress
      // event (no Ctrl/Alt modifiers, VK in the typing range). Calling
      // preventDefault() on keydown suppresses the subsequent keypress in
      // browsers, which would break WM_CHAR delivery — so leave those
      // alone and let keypress fire naturally.
      const isPrintableKey = (e) => {
        if (e.ctrlKey || e.altKey || e.metaKey) return false;
        const vk = e.keyCode;
        if (vk >= 0x30 && vk <= 0x5A) return true;           // 0-9, A-Z
        if (vk >= 0x60 && vk <= 0x6F) return true;           // numpad
        if (vk >= 0xBA && vk <= 0xC0) return true;           // ;=,-./` etc.
        if (vk >= 0xDB && vk <= 0xDE) return true;           // [\]'
        if (vk === 32) return true;                          // space
        return false;
      };
      let suppressTextInputEvents = 0;
      const charCodeFromKeyEvent = (e) => {
        if (e.ctrlKey || e.altKey || e.metaKey) return 0;
        if (typeof e.key === 'string' && e.key.length === 1) return e.key.charCodeAt(0);
        if (e.key === 'Enter') return 13;
        return 0;
      };
      const shouldIgnorePageKey = (e) => {
        const el = e.target;
        if (!el || el === canvas || el === document.body || el === document.documentElement) return false;
        const tag = (el.tagName || '').toUpperCase();
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
        if (el.isContentEditable) return true;
        return false;
      };
      const handleKeyDown = (e) => {
        if (shouldIgnorePageKey(e)) return;
        const vk = e.keyCode;
        if (renderer._exclusiveFullscreen || (vk === 115 && !e.altKey && !e.ctrlKey && !e.metaKey)) {
          requestBrowserFullscreen();
        }
        renderer.handleKeyDown(vk);
        suppressTextInputEvents = 0;
        if (!keepForBrowser(e)) {
          const charCode = charCodeFromKeyEvent(e);
          if (charCode) {
            renderer.handleKeyPress(charCode);
            suppressTextInputEvents = 2;
            e.preventDefault();
          } else if (!isPrintableKey(e)) {
            e.preventDefault();
          }
        }
      };
      const handleKeyUp = (e) => {
        if (shouldIgnorePageKey(e)) return;
        renderer.handleKeyUp(e.keyCode);
      };
      const handleKeyPress = (e) => {
        if (shouldIgnorePageKey(e)) return;
        if (suppressTextInputEvents > 0) {
          suppressTextInputEvents--;
          e.preventDefault();
          return;
        }
        e.preventDefault();
        renderer.handleKeyPress(e.charCode || e.keyCode);
      };
      const handleBeforeInput = (e) => {
        if (shouldIgnorePageKey(e)) return;
        if (suppressTextInputEvents > 0) {
          suppressTextInputEvents--;
          e.preventDefault();
          return;
        }
        if (e.data) {
          for (const ch of e.data) {
            renderer.handleKeyPress(ch.charCodeAt(0));
          }
        }
      };
      window.addEventListener('keydown', handleKeyDown, { capture: true });
      window.addEventListener('keyup', handleKeyUp, { capture: true });
      window.addEventListener('keypress', handleKeyPress, { capture: true });
      window.addEventListener('beforeinput', handleBeforeInput, { capture: true });
      canvas.onmousemove = e => {
        const { x: mx, y: my } = eventPoint(e);
        renderer.handleMenuHover(mx, my);
        // Always deliver mouse moves — WM_SETCURSOR depends on it, and games
        // like Reversi key their "valid move" cross cursor on WM_MOUSEMOVE.
        renderer.handleMouseMove(mx, my);
      };
    }

    async function launchApp() {
      const sel = document.getElementById('app-select').value;
      const app = apps[sel];
      if (!app) return;

      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      if (app.args === '/s' && !document.fullscreenElement && wrap.requestFullscreen) {
        try {
          const p = wrap.requestFullscreen();
          if (p && p.then) await p.then(resizeCanvas).catch(() => {});
        } catch (_) {}
      }
      const size = screenCanvasSize();
      canvas.width = size.w;
      canvas.height = size.h;

      const log = document.getElementById('log');
      log.textContent += `Launching ${sel}.exe...\n`;

      // Create shared renderer on first launch
      if (!sharedRenderer) {
        sharedRenderer = new Win98Renderer(canvas);
        if (!DEBUG_MODE) sharedRenderer.transparentDesktop = true;
      }

      wine = new WineAssembly();
      wine.primeAudio();
      wine.renderer = sharedRenderer;  // set before init so it won't create a new one
      wine._multiApp = true;
      await wine.init(canvas);

      // Set unique hwnd range for this app
      const appIndex = nextAppIndex++;
      const hwndBase = 0x10001 + appIndex * 0x10000;
      wine._hwndBase = hwndBase;
      if (wine.instance.exports.set_hwnd_base) {
        wine.instance.exports.set_hwnd_base(hwndBase);
      }

      wireCanvasInput(canvas, sharedRenderer);
      canvas.focus();

      document.getElementById('status').textContent = 'Loading PE...';

      const ok = await wine.loadExe(app.exe);
      if (ok) {
        if (app.files && app.files.length) {
          document.getElementById('status').textContent = 'Loading data files...';
          await wine.loadFiles(app.files);
        }
        if (app.winver && wine.instance.exports.set_winver) {
          wine.instance.exports.set_winver(app.winver);
        }
        if (app.args) {
          wine._extraArgs = app.args;
          if (wine.instance.exports.set_extra_cmdline) {
            const enc = new TextEncoder();
            const argBytes = enc.encode(app.args);
            const staging = wine.instance.exports.get_staging();
            new Uint8Array(wine.memory.buffer).set(argBytes, staging);
            wine.instance.exports.set_extra_cmdline(staging, argBytes.length);
          }
        }
        const dllsToLoad = app.dlls ? [...app.dlls] : [];
        if (DllLoader && DllLoader.detectRequiredDlls && wine._exeBytes) {
          const required = DllLoader.detectRequiredDlls(wine._exeBytes);
          const availableDlls = {
            'msvcrt.dll': 'binaries/dlls/msvcrt.dll',
            'mfc42u.dll': 'binaries/dlls/mfc42u.dll',
            'mfc42.dll': 'binaries/dlls/mfc42.dll',
            'msvcp60.dll': 'binaries/dlls/msvcp60.dll',
            'oleaut32.dll': 'binaries/dlls/oleaut32.dll',
            'd3drm.dll': 'binaries/dlls/d3drm.dll',
            'cards.dll': 'binaries/entertainment-pack/cards.dll',
          };
          const alreadyListed = new Set(dllsToLoad.map(d => d.split('/').pop().toLowerCase()));
          for (const name of required) {
            if (availableDlls[name] && !alreadyListed.has(name)) {
              dllsToLoad.push(availableDlls[name]);
            }
          }
        }
        if (dllsToLoad.length) {
          document.getElementById('status').textContent = 'Loading DLLs...';
        }
        await wine.loadDlls(dllsToLoad);
        runningApps.push({ wine, name: sel, appIndex });
        document.getElementById('status').textContent = `Running ${runningApps.length} app(s)`;
        canvas.focus();
        wine.run(sel === 'pinball' ? 500000 : 50000);
      } else {
        document.getElementById('status').textContent = 'Failed to load';
      }
    }

    function screenCanvasSize() {
      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      const fsElement = document.fullscreenElement || document.webkitFullscreenElement;
      const fullscreen = fsElement === wrap || fsElement === canvas;
      if (!fullscreen) {
        return { fullscreen, w: wrap.clientWidth, h: wrap.clientHeight };
      }

      const fsRect = fsElement && fsElement.getBoundingClientRect ? fsElement.getBoundingClientRect() : null;
      const vv = window.visualViewport;
      const w = Math.floor(Math.max(
        (fsRect && fsRect.width) || 0,
        (vv && vv.width) || 0,
        window.innerWidth || 0,
        wrap.clientWidth || 0,
        canvas.clientWidth || 0
      ));
      const h = Math.floor(Math.max(
        (fsRect && fsRect.height) || 0,
        (vv && vv.height) || 0,
        window.innerHeight || 0,
        wrap.clientHeight || 0,
        canvas.clientHeight || 0
      ));
      return { fullscreen, w, h };
    }

    // Resize canvas to match container
    function resizeCanvas() {
      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      const { fullscreen, w, h } = screenCanvasSize();
      if (fullscreen) {
        wrap.style.width = w + 'px';
        wrap.style.height = h + 'px';
        wrap.style.position = 'fixed';
        wrap.style.inset = '0';
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        canvas.style.position = 'fixed';
        canvas.style.inset = '0';
      } else {
        wrap.style.width = '';
        wrap.style.height = '';
        wrap.style.position = '';
        wrap.style.inset = '';
        canvas.style.width = '';
        canvas.style.height = '';
        canvas.style.position = '';
        canvas.style.inset = '';
      }
      if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
        console.log('[resize] canvas', canvas.width + 'x' + canvas.height, '->', w + 'x' + h);
        canvas.width = w;
        canvas.height = h;
      }
      if (wine && wine.renderer) {
        wine.renderer.repaint();
      } else if (sharedRenderer) {
        sharedRenderer.repaint();
      }
    }
    window.resizeCanvas = resizeCanvas;
    window.addEventListener('resize', resizeCanvas);
    document.addEventListener('fullscreenchange', resizeCanvas);
    document.addEventListener('webkitfullscreenchange', resizeCanvas);
    new ResizeObserver(resizeCanvas).observe(document.getElementById('screen-wrap'));

    // Taskbar clock
    setInterval(() => {
      const d = new Date();
      document.getElementById('clock').textContent =
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wine-Assembly — Windows 98 Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #008080;
      font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, sans-serif;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      margin: 8px;
    }
    #titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar {
      padding: 4px 6px;
      border-bottom: 1px solid #808080;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    #toolbar select, #toolbar button {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 8px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      cursor: pointer;
    }
    #toolbar button:active { border-style: inset; }
    #content {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }
    #screen-wrap {
      flex: 1;
      display: flex;
      background: #008080;
      overflow: hidden;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      cursor: default;
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    #log {
      width: 320px;
      min-height: 0;
      background: #000;
      color: #0f0;
      font-family: "Fixedsys", "Courier New", monospace;
      font-size: 11px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px inset #808080;
    }
    #taskbar {
      background: #c0c0c0;
      border-top: 2px outset #dfdfdf;
      padding: 2px 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: "Microsoft Sans Serif", "MS Sans Serif", Tahoma, Arial, sans-serif;
    }
    #taskbar .start-btn {
      font-weight: bold;
      padding: 2px 6px 2px 2px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      height: 22px;
    }
    #taskbar .start-btn:active { border-style: inset; }
    .win-flag { display: inline-grid; grid-template-columns: 5px 5px; gap: 1px; }
    .win-flag span { width: 5px; height: 5px; display: block; }
    #task-buttons { display: flex; gap: 2px; flex: 1; min-width: 0; overflow: hidden; }
    #task-buttons .task-btn {
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      padding: 2px 6px;
      height: 22px;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }
    #task-buttons .task-btn.active { border-style: inset; font-weight: bold; }
    #clock-area {
      margin-left: auto;
      border: 1px inset #808080;
      padding: 2px 8px;
      height: 22px;
      display: flex;
      align-items: center;
    }
    #compile-status {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #c0c0c0; border: 2px outset #dfdfdf; padding: 16px 24px;
      font-family: "MS Sans Serif", Tahoma, sans-serif; font-size: 13px;
      z-index: 9999; display: none;
    }
    #desktop-icons {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, 80px);
      grid-auto-rows: 84px;
      gap: 4px 8px;
      align-content: start;
      pointer-events: none;
      z-index: 1;
    }
    .desktop-icon {
      pointer-events: auto;
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
      padding: 2px;
    }
    .desktop-icon .icon-img {
      width: 32px; height: 32px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .desktop-icon .icon-label {
      color: white;
      font-size: 11px;
      text-align: center;
      text-shadow: 1px 1px 0 #000;
      padding: 1px 3px;
      max-width: 76px;
      word-wrap: break-word;
      line-height: 1.1;
    }
    .desktop-icon.selected .icon-label {
      background: #000080;
      outline: 1px dotted #fff;
    }
    body.no-debug #shell { margin: 0; border: 0; background: transparent; }
    body.no-debug #titlebar,
    body.no-debug #toolbar,
    body.no-debug #log { display: none; }
    body.no-debug #screen-wrap { background: #008080; }
    body.no-debug canvas { background: transparent; z-index: 2; }
  </style>
</head>
<body>
  <div id="compile-status">Compiling WAT source...</div>
  <div id="shell">
    <div id="titlebar">Wine-Assembly — Windows 98 Emulator</div>
    <div id="toolbar">
      <label>Program:</label>
      <select id="app-select">
        <option value="notepad">Notepad</option>
        <option value="calc">Calculator</option>
        <optgroup label="Entertainment Pack">
          <option value="freecell">FreeCell</option>
          <option value="sol">Solitaire</option>
          <option value="cruel">Cruel</option>
          <option value="golf">Golf</option>
          <option value="pegged">Pegged</option>
          <option value="snake">Rattler Race</option>
          <option value="taipei">Taipei</option>
          <option value="tictac">TicTactics</option>
          <option value="reversi">Reversi</option>
          <option value="winmine_wep">Minesweeper</option>
        </optgroup>
        <optgroup label="Win98 Accessories">
          <option value="mspaint98">Paint (Win98)</option>
          <option value="notepad98">Notepad (98)</option>
          <option value="mplayer">Media Player</option>
          <option value="mplay32">Media Player 32</option>
          <option value="sysmon">System Monitor</option>
          <option value="rsrcmtr">Resource Meter</option>
          <option value="cleanmgr">Disk Cleanup</option>
        </optgroup>
        <optgroup label="Other">
          <option value="ski32">SkiFree</option>
          <option value="winmine">Minesweeper (XP)</option>
          <option value="sndrec32_xp">Sound Recorder (XP)</option>
          <option value="mspaint">Paint (NT/MFC)</option>
          <option value="pinball">Space Cadet Pinball</option>
          <option value="pinball_plus95">Space Cadet Pinball (Plus! 95)</option>
        </optgroup>
      </select>
      <button onclick="launchApp()">Launch</button>
      <button onclick="runningApps.forEach(a => a.wine.running = false); runningApps.length = 0; if(sharedRenderer){sharedRenderer.windows={};sharedRenderer.repaint();}">Stop All</button>
      <span id="status" style="margin-left: auto; color: #808080;"></span>
    </div>
    <div id="content">
      <div id="screen-wrap">
        <div id="desktop-icons"></div>
        <canvas id="screen"></canvas>
      </div>
      <div id="log">Wine-Assembly v0.2
Resource-aware Win98 emulator
================================
</div>
    </div>
  </div>
  <div id="taskbar">
    <button class="start-btn"><span class="win-flag"><span style="background:#FF0000"></span><span style="background:#00FF00"></span><span style="background:#0000FF"></span><span style="background:#FFFF00"></span></span>Start</button>
    <div id="task-buttons"></div>
    <div id="clock-area"><span id="clock"></span></div>
  </div>

  <script src="lib/mem-utils.js?v=35"></script>
  <script src="lib/dib.js?v=35"></script>
  <script src="lib/renderer-input.js?v=35"></script>
  <script src="lib/renderer.js?v=35"></script>
  <script src="lib/dll-loader.js?v=35"></script>
  <script src="lib/storage.js?v=35"></script>
  <script src="lib/filesystem.js?v=35"></script>
  <script src="lib/hlp-parser.js?v=35"></script>
  <script src="lib/host-imports.js?v=35"></script>
  <script src="lib/compile-wat.js?v=35"></script>
  <script src="lib/thread-manager.js?v=35"></script>
  <script src="host.js?v=35"></script>
  <script>
    let wine = null;
    const runningApps = [];  // array of { wine, name, appIndex }
    let nextAppIndex = 0;
    let sharedRenderer = null;
    let sharedWasmModule = null;
    let inputWired = false;

    const DEFAULT_APPS = [
      ['notepad',     'Notepad',     '\u{1F4DD}'],
      ['calc',        'Calculator',  '\u{1F9EE}'],
      ['freecell',    'FreeCell',    '\u{1F0CF}'],
      ['sol',         'Solitaire',   '\u{2660}'],
      ['cruel',       'Cruel',       '\u{1F0A1}'],
      ['golf',        'Golf',        '\u{26F3}'],
      ['pegged',      'Pegged',      '\u{1F3AF}'],
      ['snake',       'Rattler',     '\u{1F40D}'],
      ['taipei',      'Taipei',      '\u{1F004}'],
      ['tictac',      'TicTactics',  '\u{274C}'],
      ['reversi',     'Reversi',     '\u{26AB}'],
      ['winmine_wep', 'Minesweeper', '\u{1F4A3}'],
      ['ski32',       'SkiFree',     '\u{26F7}'],
    ];
    const DEFAULT_APP_SET = new Set(DEFAULT_APPS.map(a => a[0]));
    const DEBUG_MODE = new URLSearchParams(location.search).has('debug');
    if (!DEBUG_MODE) {
      document.body.classList.add('no-debug');
      window.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('app-select');
        for (const opt of [...sel.querySelectorAll('option')]) {
          if (!DEFAULT_APP_SET.has(opt.value)) opt.remove();
        }
        for (const grp of [...sel.querySelectorAll('optgroup')]) {
          if (!grp.querySelector('option')) grp.remove();
        }
        const grid = document.getElementById('desktop-icons');
        for (const [value, label, glyph] of DEFAULT_APPS) {
          const el = document.createElement('div');
          el.className = 'desktop-icon';
          el.innerHTML = '<div class="icon-img">' + glyph + '</div><div class="icon-label">' + label + '</div>';
          el.addEventListener('click', () => {
            for (const e of grid.querySelectorAll('.desktop-icon.selected')) e.classList.remove('selected');
            el.classList.add('selected');
          });
          el.addEventListener('dblclick', () => {
            sel.value = value;
            launchApp();
          });
          grid.appendChild(el);
        }
      });
    }

    const apps = {
      notepad:  { exe: 'binaries/notepad.exe' },
      calc:     { exe: 'binaries/calc.exe', dlls: ['binaries/dlls/msvcrt.dll'] },
      freecell: { exe: 'binaries/entertainment-pack/freecell.exe' },
      sol:      { exe: 'binaries/entertainment-pack/sol.exe' },
      cruel:    { exe: 'binaries/entertainment-pack/cruel.exe' },
      golf:     { exe: 'binaries/entertainment-pack/golf.exe' },
      pegged:   { exe: 'binaries/entertainment-pack/pegged.exe' },
      snake:    { exe: 'binaries/entertainment-pack/snake.exe' },
      taipei:   { exe: 'binaries/entertainment-pack/taipei.exe' },
      tictac:   { exe: 'binaries/entertainment-pack/tictac.exe' },
      reversi:  { exe: 'binaries/entertainment-pack/reversi.exe' },
      winmine_wep: { exe: 'binaries/entertainment-pack/winmine.exe' },
      mspaint98: { exe: 'binaries/mspaint.exe' },
      notepad98: { exe: 'binaries/win98-apps/notepad98.exe' },
      mplayer:  { exe: 'binaries/win98-apps/mplayer.exe' },
      mplay32:  { exe: 'binaries/win98-apps/mplay32.exe' },
      sysmon:   { exe: 'binaries/win98-apps/sysmon.exe' },
      rsrcmtr:  { exe: 'binaries/win98-apps/rsrcmtr.exe' },
      cleanmgr: { exe: 'binaries/win98-apps/cleanmgr.exe' },
      mspaint:  { exe: 'binaries/nt/mspaint.exe', dlls: ['binaries/dlls/msvcrt.dll', 'binaries/dlls/mfc42u.dll'], winver: 0x05650004 },
      ski32:    { exe: 'binaries/entertainment-pack/ski32.exe' },
      winmine:  { exe: 'binaries/xp/winmine.exe' },
      sndrec32_xp: { exe: 'binaries/xp/sndrec32.exe' },
      pinball:  { exe: 'binaries/pinball/pinball.exe', files: [
        'binaries/pinball/wavemix.inf', 'binaries/pinball/PINBALL.DAT', 'binaries/pinball/FONT.DAT',
        'binaries/pinball/table.bmp', 'binaries/pinball/PINBALL.MID', 'binaries/pinball/PINBALL2.MID',
      ] },
      pinball_plus95: { exe: 'binaries/pinball-plus95/pinball.exe', files: [
        'binaries/pinball-plus95/wavemix.inf', 'binaries/pinball-plus95/PINBALL.DAT', 'binaries/pinball-plus95/FONT.DAT',
        'binaries/pinball-plus95/table.bmp', 'binaries/pinball-plus95/PINBALL.MID', 'binaries/pinball-plus95/PINBALL2.MID',
      ] },
    };

    function wireCanvasInput(canvas, renderer) {
      if (inputWired) return;
      inputWired = true;
      canvas.oncontextmenu = e => e.preventDefault();
      canvas.onmousedown = e => {
        canvas.focus();
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        renderer.handleMouseDown(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy),
          e.button
        );
      };
      canvas.onmouseup = e => {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        renderer.handleMouseUp(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy),
          e.button
        );
      };
      canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        renderer.handleWheel(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy),
          e.deltaY
        );
      }, { passive: false });
      canvas.setAttribute('tabindex', '0');
      canvas.focus();
      canvas.addEventListener('keydown', e => {
        const vk = e.keyCode;
        renderer.handleKeyDown(vk);
        if (vk === 8 || vk === 9 || vk === 37 || vk === 38 || vk === 39 || vk === 40 || vk === 36 || vk === 35 || vk === 46 || (vk >= 112 && vk <= 123)) {
          e.preventDefault();
        }
        if (e.ctrlKey && (vk === 65 || vk === 67 || vk === 88 || vk === 86)) e.preventDefault();
        if (e.altKey) e.preventDefault();
      });
      canvas.addEventListener('keyup', e => {
        renderer.handleKeyUp(e.keyCode);
      });
      canvas.addEventListener('keypress', e => {
        e.preventDefault();
        renderer.handleKeyPress(e.charCode || e.keyCode);
      });
      canvas.addEventListener('beforeinput', e => {
        if (e.data) {
          for (const ch of e.data) {
            renderer.handleKeyPress(ch.charCodeAt(0));
          }
        }
      });
      canvas.onmousemove = e => {
        const rr = canvas.getBoundingClientRect();
        const ssx = canvas.width / rr.width, ssy = canvas.height / rr.height;
        renderer.handleMenuHover(
          Math.floor((e.clientX - rr.left) * ssx),
          Math.floor((e.clientY - rr.top) * ssy)
        );
        if (e.buttons & 1) {
          renderer.handleMouseMove(
            Math.floor((e.clientX - rr.left) * ssx),
            Math.floor((e.clientY - rr.top) * ssy)
          );
        }
      };
    }

    async function launchApp() {
      const sel = document.getElementById('app-select').value;
      const app = apps[sel];
      if (!app) return;

      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      canvas.width = wrap.clientWidth;
      canvas.height = wrap.clientHeight;

      const log = document.getElementById('log');
      log.textContent += `Launching ${sel}.exe...\n`;

      // Create shared renderer on first launch
      if (!sharedRenderer) {
        sharedRenderer = new Win98Renderer(canvas);
        if (!DEBUG_MODE) sharedRenderer.transparentDesktop = true;
      }

      wine = new WineAssembly();
      wine.renderer = sharedRenderer;  // set before init so it won't create a new one
      wine._multiApp = true;
      await wine.init(canvas);

      // Set unique hwnd range for this app
      const appIndex = nextAppIndex++;
      const hwndBase = 0x10001 + appIndex * 0x10000;
      wine._hwndBase = hwndBase;
      if (wine.instance.exports.set_hwnd_base) {
        wine.instance.exports.set_hwnd_base(hwndBase);
      }

      wireCanvasInput(canvas, sharedRenderer);

      document.getElementById('status').textContent = 'Loading PE...';

      const ok = await wine.loadExe(app.exe);
      if (ok) {
        if (app.files && app.files.length) {
          document.getElementById('status').textContent = 'Loading data files...';
          await wine.loadFiles(app.files);
        }
        if (app.winver && wine.instance.exports.set_winver) {
          wine.instance.exports.set_winver(app.winver);
        }
        const dllsToLoad = app.dlls ? [...app.dlls] : [];
        if (DllLoader && DllLoader.detectRequiredDlls && wine._exeBytes) {
          const required = DllLoader.detectRequiredDlls(wine._exeBytes);
          const availableDlls = {
            'msvcrt.dll': 'binaries/dlls/msvcrt.dll',
            'mfc42u.dll': 'binaries/dlls/mfc42u.dll',
            'mfc42.dll': 'binaries/dlls/mfc42.dll',
            'msvcp60.dll': 'binaries/dlls/msvcp60.dll',
            'oleaut32.dll': 'binaries/dlls/oleaut32.dll',
            'cards.dll': 'binaries/entertainment-pack/cards.dll',
          };
          const alreadyListed = new Set(dllsToLoad.map(d => d.split('/').pop().toLowerCase()));
          for (const name of required) {
            if (availableDlls[name] && !alreadyListed.has(name)) {
              dllsToLoad.push(availableDlls[name]);
            }
          }
        }
        if (dllsToLoad.length) {
          document.getElementById('status').textContent = 'Loading DLLs...';
          await wine.loadDlls(dllsToLoad);
        }
        runningApps.push({ wine, name: sel, appIndex });
        document.getElementById('status').textContent = `Running ${runningApps.length} app(s)`;
        wine.run();
      } else {
        document.getElementById('status').textContent = 'Failed to load';
      }
    }

    // Resize canvas to match container
    function resizeCanvas() {
      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
        console.log('[resize] canvas', canvas.width + 'x' + canvas.height, '->', w + 'x' + h);
        canvas.width = w;
        canvas.height = h;
        if (wine && wine.renderer) {
          wine.renderer.repaint();
        }
      }
    }
    window.addEventListener('resize', resizeCanvas);
    new ResizeObserver(resizeCanvas).observe(document.getElementById('screen-wrap'));

    // Taskbar clock
    setInterval(() => {
      const d = new Date();
      document.getElementById('clock').textContent =
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>

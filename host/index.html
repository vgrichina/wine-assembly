<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wine-Assembly — Windows 98 Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #008080;
      font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, sans-serif;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      margin: 8px;
    }
    #titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar {
      padding: 4px 6px;
      border-bottom: 1px solid #808080;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    #toolbar select, #toolbar button {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 8px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      cursor: pointer;
    }
    #toolbar button:active { border-style: inset; }
    #content {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }
    #screen-wrap {
      flex: 1;
      display: flex;
      background: #008080;
      overflow: hidden;
      position: relative;
    }
    canvas {
      image-rendering: pixelated;
      cursor: default;
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    #log {
      width: 320px;
      min-height: 0;
      background: #000;
      color: #0f0;
      font-family: "Fixedsys", "Courier New", monospace;
      font-size: 11px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px inset #808080;
    }
    #taskbar {
      background: #c0c0c0;
      border-top: 2px outset #dfdfdf;
      padding: 2px 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 2px;
      font-family: "Microsoft Sans Serif", "MS Sans Serif", Tahoma, Arial, sans-serif;
    }
    #taskbar .start-btn {
      font-weight: bold;
      padding: 2px 6px 2px 2px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      height: 22px;
    }
    #taskbar .start-btn:active { border-style: inset; }
    .win-flag { display: inline-grid; grid-template-columns: 5px 5px; gap: 1px; }
    .win-flag span { width: 5px; height: 5px; display: block; }
    #task-buttons { display: flex; gap: 2px; flex: 1; min-width: 0; overflow: hidden; }
    #task-buttons .task-btn {
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      padding: 2px 6px;
      height: 22px;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }
    #task-buttons .task-btn.active { border-style: inset; font-weight: bold; }
    #clock-area {
      margin-left: auto;
      border: 1px inset #808080;
      padding: 2px 8px;
      height: 22px;
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="titlebar">Wine-Assembly — Windows 98 Emulator</div>
    <div id="toolbar">
      <label>Program:</label>
      <select id="app-select">
        <option value="notepad">Notepad</option>
        <option value="calc">Calculator</option>
        <optgroup label="Entertainment Pack">
          <option value="freecell">FreeCell</option>
          <option value="sol">Solitaire</option>
          <option value="cruel">Cruel</option>
          <option value="golf">Golf</option>
          <option value="pegged">Pegged</option>
          <option value="snake">Rattler Race</option>
          <option value="taipei">Taipei</option>
          <option value="tictac">TicTactics</option>
          <option value="mspaint">Paint</option>
        </optgroup>
        <optgroup label="Other">
          <option value="ski32">SkiFree</option>
          <option value="winmine">Minesweeper (XP)</option>
        </optgroup>
      </select>
      <button onclick="launchApp()">Launch</button>
      <button onclick="wine && (wine.running = false)">Stop</button>
      <span id="status" style="margin-left: auto; color: #808080;"></span>
    </div>
    <div id="content">
      <div id="screen-wrap">
        <canvas id="screen"></canvas>
      </div>
      <div id="log">Wine-Assembly v0.2
Resource-aware Win98 emulator
================================
</div>
    </div>
  </div>
  <div id="taskbar">
    <button class="start-btn"><span class="win-flag"><span style="background:#FF0000"></span><span style="background:#00FF00"></span><span style="background:#0000FF"></span><span style="background:#FFFF00"></span></span>Start</button>
    <div id="task-buttons"></div>
    <div id="clock-area"><span id="clock"></span></div>
  </div>

  <script src="../lib/resources.js?v=7"></script>
  <script src="../lib/renderer.js?v=7"></script>
  <script src="../lib/dll-loader.js?v=7"></script>
  <script src="host.js?v=7"></script>
  <script>
    let wine = null;

    const apps = {
      notepad:  { exe: '../test/binaries/notepad.exe' },
      calc:     { exe: '../test/binaries/calc.exe' },
      freecell: { exe: '../test/binaries/entertainment-pack/freecell.exe' },
      sol:      { exe: '../test/binaries/entertainment-pack/sol.exe' },
      cruel:    { exe: '../test/binaries/entertainment-pack/cruel.exe' },
      golf:     { exe: '../test/binaries/entertainment-pack/golf.exe' },
      pegged:   { exe: '../test/binaries/entertainment-pack/pegged.exe' },
      snake:    { exe: '../test/binaries/entertainment-pack/snake.exe' },
      taipei:   { exe: '../test/binaries/entertainment-pack/taipei.exe' },
      tictac:   { exe: '../test/binaries/entertainment-pack/tictac.exe' },
      mspaint:  { exe: '../test/binaries/entertainment-pack/mspaint.exe', dlls: ['../test/binaries/dlls/msvcrt.dll', '../test/binaries/dlls/mfc42u.dll'] },
      ski32:    { exe: '../test/binaries/entertainment-pack/ski32.exe' },
      winmine:  { exe: '../test/binaries/xp/winmine.exe' },
    };

    async function launchApp() {
      const sel = document.getElementById('app-select').value;
      const app = apps[sel];
      if (!app) return;

      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      canvas.width = wrap.clientWidth;
      canvas.height = wrap.clientHeight;

      const log = document.getElementById('log');
      log.textContent = `Launching ${sel}.exe...\n`;

      wine = new WineAssembly();
      await wine.init(canvas);

      // Wire canvas events
      canvas.onmousedown = e => {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        wine.renderer.handleMouseDown(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy)
        );
      };
      canvas.onmouseup = e => {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        wine.renderer.handleMouseUp(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy)
        );
      };
      canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        wine.renderer.handleWheel(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy),
          e.deltaY
        );
      }, { passive: false });
      canvas.setAttribute('tabindex', '0');
      canvas.focus();
      canvas.addEventListener('keydown', e => {
        const vk = e.keyCode;
        wine.renderer.handleKeyDown(vk);
        if (vk === 8 || vk === 9 || vk === 37 || vk === 38 || vk === 39 || vk === 40 || vk === 36 || vk === 35 || vk === 46 || (vk >= 112 && vk <= 123)) {
          e.preventDefault();
        }
        if (e.ctrlKey && (vk === 65 || vk === 67 || vk === 88 || vk === 86)) e.preventDefault();
        if (e.altKey) e.preventDefault();
      });
      canvas.addEventListener('keyup', e => {
        wine.renderer.handleKeyUp(e.keyCode);
      });
      canvas.addEventListener('keypress', e => {
        e.preventDefault();
        wine.renderer.handleKeyPress(e.charCode || e.keyCode);
      });
      // Fallback for browsers where keypress doesn't fire
      canvas.addEventListener('beforeinput', e => {
        if (e.data) {
          for (const ch of e.data) {
            wine.renderer.handleKeyPress(ch.charCodeAt(0));
          }
        }
      });
      canvas.onmousemove = e => {
        // Track hover for menus
        const rr = canvas.getBoundingClientRect();
        const ssx = canvas.width / rr.width, ssy = canvas.height / rr.height;
        wine.renderer.handleMenuHover(
          Math.floor((e.clientX - rr.left) * ssx),
          Math.floor((e.clientY - rr.top) * ssy)
        );
        if (e.buttons & 1) { // only while button held
          const r = canvas.getBoundingClientRect();
          const sx = canvas.width / r.width, sy = canvas.height / r.height;
          wine.renderer.handleMouseMove(
            Math.floor((e.clientX - r.left) * sx),
            Math.floor((e.clientY - r.top) * sy)
          );
        }
      };

      document.getElementById('status').textContent = 'Loading PE...';

      const ok = await wine.loadExe(app.exe);
      if (ok) {
        if (app.dlls && app.dlls.length) {
          document.getElementById('status').textContent = 'Loading DLLs...';
          await wine.loadDlls(app.dlls);
        }
        document.getElementById('status').textContent = 'Running ' + sel + '.exe';
        wine.run();
      } else {
        document.getElementById('status').textContent = 'Failed to load';
      }
    }

    // Resize canvas to match container
    function resizeCanvas() {
      const canvas = document.getElementById('screen');
      const wrap = document.getElementById('screen-wrap');
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
        console.log('[resize] canvas', canvas.width + 'x' + canvas.height, '->', w + 'x' + h);
        canvas.width = w;
        canvas.height = h;
        if (wine && wine.renderer) {
          wine.renderer.repaint();
        }
      }
    }
    window.addEventListener('resize', resizeCanvas);
    new ResizeObserver(resizeCanvas).observe(document.getElementById('screen-wrap'));

    // Taskbar clock
    setInterval(() => {
      const d = new Date();
      document.getElementById('clock').textContent =
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>

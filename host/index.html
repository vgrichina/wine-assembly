<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wine-Assembly — Windows 98 Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #008080;
      font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, sans-serif;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      margin: 20px;
    }
    #toolbar {
      padding: 6px;
      border-bottom: 1px solid #808080;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #toolbar button {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 12px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      cursor: pointer;
    }
    #toolbar button:active { border-style: inset; }
    #toolbar input[type="file"] { font-size: 12px; }
    #content {
      flex: 1;
      display: flex;
      gap: 0;
    }
    #screen-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      min-height: 300px;
    }
    canvas {
      image-rendering: pixelated;
      background: #000;
    }
    #log {
      width: 400px;
      background: #000;
      color: #0f0;
      font-family: "Fixedsys", "Courier New", monospace;
      font-size: 12px;
      padding: 8px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px inset #808080;
    }
    #taskbar {
      background: #c0c0c0;
      border-top: 2px outset #dfdfdf;
      padding: 4px 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div id="main">
    <div id="titlebar">
      &#128187; Wine-Assembly — Windows 98 Emulator
    </div>
    <div id="toolbar">
      <input type="file" id="exe-file" accept=".exe">
      <button onclick="loadFromFile()">Load EXE</button>
      <button onclick="loadDemo()">Load Demo (hello.exe)</button>
      <button onclick="wine.running = false">Stop</button>
    </div>
    <div id="content">
      <div id="screen-container">
        <canvas id="screen" width="640" height="480"></canvas>
      </div>
      <div id="log">Wine-Assembly v0.1
Forth-threaded x86 interpreter
================================
</div>
    </div>
  </div>
  <div id="taskbar">
    <span>Ready</span>
    <span id="clock"></span>
  </div>

  <script src="host.js"></script>
  <script>
    // Load from file picker
    function loadFromFile() {
      const file = document.getElementById('exe-file').files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      loadAndRun(url);
    }

    // Load the built-in demo PE
    function loadDemo() {
      loadAndRun('../test/hello.exe');
    }

    // Taskbar clock
    setInterval(() => {
      const d = new Date();
      document.getElementById('clock').textContent =
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>

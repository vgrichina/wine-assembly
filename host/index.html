<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wine-Assembly — Windows 98 Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #008080;
      font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, sans-serif;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      margin: 8px;
    }
    #titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar {
      padding: 4px 6px;
      border-bottom: 1px solid #808080;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }
    #toolbar select, #toolbar button {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 8px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      cursor: pointer;
    }
    #toolbar button:active { border-style: inset; }
    #content {
      flex: 1;
      display: flex;
      gap: 0;
      min-height: 0;
    }
    #screen-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px;
      background: #008080;
      overflow: auto;
    }
    canvas {
      image-rendering: pixelated;
      cursor: default;
    }
    #log {
      width: 320px;
      background: #000;
      color: #0f0;
      font-family: "Fixedsys", "Courier New", monospace;
      font-size: 11px;
      padding: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border-left: 2px inset #808080;
    }
    #taskbar {
      background: #c0c0c0;
      border-top: 2px outset #dfdfdf;
      padding: 4px 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }
    #taskbar .start-btn {
      font-weight: bold;
      padding: 2px 8px;
      background: #c0c0c0;
      border: 2px outset #dfdfdf;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    #taskbar .start-btn:active { border-style: inset; }
  </style>
</head>
<body>
  <div id="shell">
    <div id="titlebar">Wine-Assembly — Windows 98 Emulator</div>
    <div id="toolbar">
      <label>Program:</label>
      <select id="app-select">
        <option value="notepad">Notepad</option>
        <option value="calc">Calculator</option>
      </select>
      <button onclick="launchApp()">Launch</button>
      <button onclick="wine && (wine.running = false)">Stop</button>
      <span id="status" style="margin-left: auto; color: #808080;"></span>
    </div>
    <div id="content">
      <div id="screen-wrap">
        <canvas id="screen" width="640" height="480"></canvas>
      </div>
      <div id="log">Wine-Assembly v0.2
Resource-aware Win98 emulator
================================
</div>
    </div>
  </div>
  <div id="taskbar">
    <button class="start-btn">Start</button>
    <span id="clock"></span>
  </div>

  <script src="../lib/resources.js"></script>
  <script src="../lib/renderer.js"></script>
  <script src="host.js"></script>
  <script>
    let wine = null;

    const apps = {
      notepad: { exe: '../test/binaries/notepad.exe', w: 640, h: 480 },
      calc:    { exe: '../test/binaries/calc.exe',    w: 520, h: 380 },
    };

    async function launchApp() {
      const sel = document.getElementById('app-select').value;
      const app = apps[sel];
      if (!app) return;

      const canvas = document.getElementById('screen');
      canvas.width = app.w;
      canvas.height = app.h;

      const log = document.getElementById('log');
      log.textContent = `Launching ${sel}.exe...\n`;

      wine = new WineAssembly();
      await wine.init(canvas);

      // Wire canvas events
      canvas.onmousedown = e => {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        wine.renderer.handleMouseDown(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy)
        );
      };
      canvas.onmouseup = e => {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        wine.renderer.handleMouseUp(
          Math.floor((e.clientX - r.left) * sx),
          Math.floor((e.clientY - r.top) * sy)
        );
      };
      canvas.setAttribute('tabindex', '0');
      canvas.focus();
      canvas.addEventListener('keydown', e => {
        const vk = e.keyCode;
        console.log('keydown', vk, e.key);
        wine.renderer.handleKeyDown(vk);
        if (vk === 8 || vk === 9 || (vk >= 112 && vk <= 123)) {
          e.preventDefault();
        }
      });
      canvas.addEventListener('keypress', e => {
        e.preventDefault();
        console.log('keypress', e.charCode, String.fromCharCode(e.charCode));
        wine.renderer.handleKeyPress(e.charCode || e.keyCode);
      });
      // Fallback for browsers where keypress doesn't fire
      canvas.addEventListener('beforeinput', e => {
        if (e.data) {
          for (const ch of e.data) {
            wine.renderer.handleKeyPress(ch.charCodeAt(0));
          }
        }
      });
      canvas.onmousemove = e => {
        if (e.buttons & 1) { // only while button held
          const r = canvas.getBoundingClientRect();
          const sx = canvas.width / r.width, sy = canvas.height / r.height;
          wine.renderer.handleMouseMove(
            Math.floor((e.clientX - r.left) * sx),
            Math.floor((e.clientY - r.top) * sy)
          );
        }
      };

      document.getElementById('status').textContent = 'Loading PE...';

      const ok = await wine.loadExe(app.exe);
      if (ok) {
        document.getElementById('status').textContent = 'Running ' + sel + '.exe';
        wine.run();
      } else {
        document.getElementById('status').textContent = 'Failed to load';
      }
    }

    // Taskbar clock
    setInterval(() => {
      const d = new Date();
      document.getElementById('clock').textContent =
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
